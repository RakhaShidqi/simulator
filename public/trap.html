<!-- public/trap.html - VERSI DIPERBAIKI -->
<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <style>
        body { 
            font-family: Arial; 
            text-align: center; 
            padding-top: 50px;
            background: #f5f5f5;
        }
        .loading {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 2s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            color: #666;
            font-size: 14px;
            margin: 10px 0;
        }
        .debug {
            display: none; /* Sembunyikan untuk produksi */
            background: #f0f0f0;
            padding: 10px;
            margin: 20px;
            text-align: left;
            font-size: 12px;
            border-radius: 5px;
        }
    </style>
    <script src="js/trap.js"></script>
</head>
<body>
    <h2>Memuat halaman...</h2>
    <div class="loading"></div>
    <div class="status" id="status">Menyiapkan konten...</div>
    
    <!-- Div untuk debug (bisa diaktifkan jika perlu) -->
    <div class="debug" id="debug"></div>
    
    <div style="margin-top: 50px; color: #999; font-size: 12px;">
        ⚠️ DEMO KEAMANAN SIBER - UNTUK TUJUAN EDUKASI ⚠️
    </div>
</body>
</html>
